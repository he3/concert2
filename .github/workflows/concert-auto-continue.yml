name: Concert Auto-Continue
on:
  push:
    paths: ['docs/concert/state.json']

jobs:
  check-and-continue:
    if: contains(github.event.head_commit.message, 'docs(concert)')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check if work remains
        id: check
        run: |
          if command -v jq &> /dev/null; then
            STAGE=$(jq -r '.stage' docs/concert/state.json)
            if [ "$STAGE" != "done" ] && [ "$STAGE" != "verified" ]; then
              echo "continue=true" >> $GITHUB_OUTPUT
            else
              echo "continue=false" >> $GITHUB_OUTPUT
            fi
          fi
      - name: Output status
        if: steps.check.outputs.continue == 'true'
        run: echo "Work remains — trigger concert-continue agent on this branch"
